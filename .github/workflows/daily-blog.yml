name: Daily Blog Post to Blogger

on:
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC
    - cron: '0 7 * * *'    # 07:00 UTC
    - cron: '30 12 * * *'  # 12:30 UTC
    - cron: '0 13 * * *'   # 13:00 UTC
    - cron: '30 16 * * *'  # 16:30 UTC
    - cron: '0 19 * * *'   # 19:00 UTC
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # Cache Ollama models to speed up runs
      - name: Cache Ollama
        id: cache-ollama
        uses: actions/cache@v3
        with:
          path: |
            ~/.ollama
            /usr/local/bin/ollama
          key: ${{ runner.os }}-ollama

      - name: Install Ollama (if not cached)
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Start Ollama service
        run: |
          /usr/local/bin/ollama serve &
          sleep 10
          for i in {1..10}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "✅ Ollama ready"
              break
            fi
            sleep 3
          done

      - name: Pull models (Llama 3 + phi)
        run: |
          /usr/local/bin/ollama pull llama3:8b
          /usr/local/bin/ollama pull phi

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client pillow

      - name: Generate and post to Blogger
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          mkdir -p .blog-cache _posts
          python scripts/generate_post.py

      - name: Upload post artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-post-${{ github.run_id }}
          path: _posts/*.md
