name: Daily Blog Post to Blogger

on:
  schedule:
    - cron: '0 8 * * *'  # 8 AM UTC daily
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Ollama
        id: cache-ollama
        uses: actions/cache@v3
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama

      - name: Install Ollama
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          ollama serve &
          sleep 5

      - name: Pull model
        run: |
          ollama pull phi

      - name: Install Python deps
        run: |
          pip install feedparser requests beautifulsoup4

      - name: Generate and Save Post
        run: |
          mkdir -p .blog-cache
          python scripts/generate_post.py

      - name: Upload Post as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-post-${{ github.run_id }}
          path: .blog-cache/post_*.html
