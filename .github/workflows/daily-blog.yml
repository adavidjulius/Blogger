name: Daily Blog Post to Blogger (AirLLM Edition)

on:
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC (09:00 IST)
    - cron: '0 7 * * *'    # 07:00 UTC (12:30 IST)
    - cron: '30 12 * * *'  # 12:30 UTC (18:00 IST)
    - cron: '0 13 * * *'   # 13:00 UTC (18:30 IST)
    - cron: '30 16 * * *'  # 16:30 UTC (22:00 IST)
    - cron: '0 19 * * *'   # 19:00 UTC (00:30 IST)
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.5'
          cache: 'pip'

      # Cache Ollama (fallback models)
      - name: Cache Ollama
        id: cache-ollama
        uses: actions/cache@v3
        with:
          path: |
            ~/.ollama
            /usr/local/bin/ollama
          key: ${{ runner.os }}-ollama

      - name: Install Ollama (if not cached)
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Start Ollama service
        run: |
          /usr/local/bin/ollama serve &
          sleep 10
          for i in {1..10}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "✅ Ollama ready"
              break
            fi
            echo "Waiting for Ollama... ($i/10)"
            sleep 3
          done

      - name: Pull Ollama models
        run: |
          /usr/local/bin/ollama pull llama3:8b
          /usr/local/bin/ollama pull phi

      # Cache AirLLM models
      - name: Cache AirLLM
        id: cache-airllm
        uses: actions/cache@v3
        with:
          path: ~/.cache/airllm
          key: ${{ runner.os }}-airllm-${{ hashFiles('scripts/generate_post.py') }}
          restore-keys: |
            ${{ runner.os }}-airllm-

      # Install Python dependencies with retry (in case of network issues)
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # Install PyTorch (CUDA or CPU fallback)
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118 || \
            pip install torch torchvision torchaudio  # fallback to CPU version
          pip install airllm feedparser requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client pillow
        shell: bash

      # Debug step (optional, shows installed packages)
      - name: Debug installed packages
        run: |
          pip list | grep -E 'torch|airllm|google|feedparser|requests'
          echo "AirLLM installed: $(python -c 'import airllm; print("✅")' 2>/dev/null || echo "❌")"
        continue-on-error: true

      - name: Generate and post to Blogger
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p .blog-cache _posts
          python scripts/generate_post.py

      - name: Upload post artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-post-${{ github.run_id }}
          path: _posts/*.md
