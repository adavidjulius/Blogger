name: Daily Blog Post

on:
  schedule:
    - cron: '30 3 * * *'
    - cron: '0 7 * * *'
    - cron: '30 12 * * *'
    - cron: '0 13 * * *'
    - cron: '30 16 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Cache Ollama
        id: cache-ollama
        uses: actions/cache@v3
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama
      - name: Install Ollama
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "/usr/local/bin" >> $GITHUB_PATH
      - name: Start Ollama
        run: |
          ollama serve &
          sleep 10
          for i in {1..10}; do
            curl -s http://localhost:11434/api/tags && break || sleep 3
          done
      - name: Pull phi
        run: ollama pull phi
      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install feedparser requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client pillow
      - name: Generate and post
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p .blog-cache _posts
          python scripts/generate_post.py
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-post-${{ github.run_id }}
          path: _posts/*.md
