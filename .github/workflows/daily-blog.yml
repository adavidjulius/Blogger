name: Daily Blog Post to Blogger

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Use Python 3.11 (Google future-proof)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # 🔥 Install Python dependencies
      - name: Install Python dependencies
        run: |
          pip install feedparser requests \
          google-auth google-auth-oauthlib \
          google-auth-httplib2 google-api-python-client

      # 🚀 Install Ollama
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      # 🚀 Start Ollama
      - name: Start Ollama service
        run: |
          ollama serve &
          sleep 10

      # 📦 Pull model (phi is lighter for CI)
      - name: Pull model
        run: ollama pull phi

      # 🔐 Inject Secrets Securely
      - name: Generate and Post
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
        run: |
          mkdir -p .blog-cache _posts
          python scripts/generate_post.py

      # 📦 Always keep backup
      - name: Upload backup post
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-post-${{ github.run_id }}
          path: _posts/*.md
