name: Daily Blog Post to Blogger

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 AM UTC
    - cron: '0 14 * * *'  # 2:00 PM UTC
    - cron: '0 20 * * *'  # 8:00 PM UTC
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Ollama
        id: cache-ollama
        uses: actions/cache@v3
        with:
          path: |
            ~/.ollama
            /usr/local/bin/ollama
          key: ${{ runner.os }}-ollama

      - name: Install Ollama (if not cached)
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "Ollama installed"

      - name: Start Ollama service
        run: |
          /usr/local/bin/ollama serve &
          sleep 15
          # Wait for Ollama to be ready
          for i in {1..15}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "✅ Ollama is ready"
              break
            fi
            echo "Waiting for Ollama... ($i/15)"
            sleep 3
          done

      - name: Pull Falcon 7B model
        run: |
          /usr/local/bin/ollama pull falcon:7b
          echo "✅ Falcon 7B pulled"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client pillow

      - name: Generate ONE post and publish to Blogger
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          mkdir -p .blog-cache _posts
          python scripts/generate_post.py

      - name: Upload post as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-post-${{ github.run_id }}
          path: _posts/*.md
