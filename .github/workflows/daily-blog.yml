name: Daily Blog Post

on:
  schedule:
    - cron: '0 8 * * *'  # 8 AM UTC daily
  workflow_dispatch:  # Manual trigger

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'  # Cache Python dependencies

      - name: Cache Ollama
        id: cache-ollama
        uses: actions/cache@v3
        with:
          path: |
            ~/.ollama
            /usr/local/bin/ollama
          key: ${{ runner.os }}-ollama-${{ hashFiles('**/ollama-version.txt') }}
          restore-keys: |
            ${{ runner.os }}-ollama-

      - name: Install Ollama (if not cached)
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "ollama-$(ollama --version)" > ollama-version.txt

      - name: Start Ollama service
        run: |
          ollama serve &
          sleep 5  # Wait for service to start
          # Test if Ollama is responding
          curl -s http://localhost:11434/api/tags || echo "Ollama not ready yet"

      - name: Cache LLM Model
        id: cache-model
        uses: actions/cache@v3
        with:
          path: ~/.ollama/models
          key: ${{ runner.os }}-ollama-model-phi
          restore-keys: |
            ${{ runner.os }}-ollama-model-

      - name: Pull LLM model (if not cached)
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          ollama pull phi  # Microsoft Phi-2 (2.7B) - good CPU model
          # Alternative smaller models: 
          # ollama pull tinyllama  # 1.1B params, faster
          # ollama pull mistral  # 7B params, better but slower

      - name: Install Python dependencies
        run: |
          pip install feedparser requests beautifulsoup4

      - name: Cache generated posts metadata
        id: cache-metadata
        uses: actions/cache@v3
        with:
          path: .blog-cache
          key: ${{ runner.os }}-blog-metadata-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-blog-metadata-

      - name: Generate blog post
        env:
          # No API keys needed - using free RSS feeds
          PYTHONUNBUFFERED: 1
        run: |
          # Create cache directory if it doesn't exist
          mkdir -p .blog-cache
          chmod +x scripts/generate_post.py
          python scripts/generate_post.py

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _posts/ .blog-cache/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generated blog post for $(date +'%Y-%m-%d')"
          git push
