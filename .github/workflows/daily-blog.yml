name: Daily Blog Post to Blogger

on:
  schedule:
    - cron: '0 8 * * *'   # 8 AM UTC daily
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Ollama
        id: cache-ollama
        uses: actions/cache@v3
        with:
          path: |
            ~/.ollama
            /usr/local/bin/ollama
          key: ${{ runner.os }}-ollama

      - name: Install Ollama (if not cached)
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          # The install script places ollama in /usr/local/bin

      - name: Verify Ollama installation
        run: |
          if [ -f /usr/local/bin/ollama ]; then
            echo "✅ Ollama found"
            /usr/local/bin/ollama --version
          else
            echo "❌ Ollama not found"
            exit 1
          fi

      - name: Start Ollama service
        run: |
          /usr/local/bin/ollama serve &
          sleep 10
          # Wait for Ollama to be ready
          for i in {1..10}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "✅ Ollama is ready"
              break
            fi
            echo "Waiting for Ollama... ($i/10)"
            sleep 3
          done

      - name: Pull model
        run: |
          /usr/local/bin/ollama pull phi

      - name: Install Python dependencies
        run: |
          pip install feedparser requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Generate and Post
        run: |
          mkdir -p .blog-cache _posts
          python scripts/generate_post.py

      - name: Upload backup post
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-post-${{ github.run_id }}
          path: _posts/*.md
